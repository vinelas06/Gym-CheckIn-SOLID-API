name: Run Unit Tests

on: [push]

jobs:
  run-unit-tests:
    name: Run Unity Tests
    runs-on: ubunto-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          package-manager-cache: false

      - run: npm ci

      - run: npm run test
